title: "greece"
description: "学习记录 · 欢迎指导"
locale: "zh-CN"
url: "https://ygreece.github.io"
baseurl: ""
repository: "Ygreece/Ygreece.github.io"

remote_theme: mmistakes/minimal-mistakes@4.28.0

plugins:
  - jekyll-include-cache
  - jekyll-remote-theme

collections:
  pages:
    output: true
    permalink: /:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true

author:
  name: "greece"
  bio: "西北农林科技大学 · 电子信息工程 · 学习中"
  avatar: "/assets/images/profile.svg"
  links:
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:wkldmz666@nwsuaf.edu.cn"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Ygreece"

navigation:
  main:
    - title: "关于"
      url: /about/
    - title: "项目"
      url: /projects/
    - title: "联系"
      url: /contact/

enable_copy_code_button: true

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/Ygreece"

social:
  name: "greece"
  links:
    - https://github.com/Ygreece

# Custom scripts
head_scripts:
  - "/assets/js/particles.js"

footer_scripts:
  - "/assets/js/animations.js"

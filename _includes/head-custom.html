<script>
(function() {
  // Load custom CSS
  var link = document.createElement("link");
  link.rel = "stylesheet";
  link.href = "/assets/css/custom.css";
  document.head.appendChild(link);

  // Load particles.js
  var script = document.createElement("script");
  script.src = "/assets/js/particles.js";
  script.defer = true;
  document.head.appendChild(script);

  // Add animations after DOM load
  document.addEventListener("DOMContentLoaded", function() {
    setTimeout(function() {
      var elements = document.querySelectorAll(".page__content h1, .page__content h2, .page__content h3, .page__content p, .page__content ul, .page__content table, .archive__item");
      elements.forEach(function(el, i) {
        el.classList.add("fade-in");
        el.style.animationDelay = (i * 0.1) + "s";
      });

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll(".fade-in").forEach(function(el) { observer.observe(el); });
    }, 100);
  });
})();
</script>

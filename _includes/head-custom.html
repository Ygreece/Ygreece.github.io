<link rel="stylesheet" href="/assets/css/custom.css">
<script src="/assets/js/particles.js" defer></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  // Add fade-in class to elements
  const elements = document.querySelectorAll(".page__content h1, .page__content h2, .page__content h3, .page__content p, .page__content ul, .page__content table, .archive__item");
  elements.forEach((el, i) => {
    el.classList.add("fade-in");
    el.style.animationDelay = (i * 0.1) + "s";
  });

  // Intersection Observer for scroll animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll(".fade-in").forEach(el => observer.observe(el));
});
</script>
